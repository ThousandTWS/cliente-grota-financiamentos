volumes:
  postgres_data:
  redis_data:
  npm_data:
  npm_letsencrypt:
  npm_db_data:
  portainer_data:

services:
  postgres:
    image: postgres:17
    container_name: grota_postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grota_db}
      POSTGRES_USER: ${POSTGRES_USER:-grota_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-grota_user} -d ${POSTGRES_DB:-grota_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: grota_redis
    restart: unless-stopped
    network_mode: host
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no arquivo .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-service:
    build:
      context: ../../apps/api-service
      dockerfile: Dockerfile
    image: grota/api-service:prod
    container_name: grota_api_service
    restart: unless-stopped
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/${POSTGRES_DB:-grota_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-grota_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_JPA_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-10MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-10MB}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Defina JWT_SECRET_KEY no arquivo .env}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-7200000}
      JWT_REFRESH_TOKEN_EXPIRATION_TIME: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME:-604800000}
      SWAGGER_AUTH_USERNAME: ${SWAGGER_AUTH_USERNAME:-swagger}
      SWAGGER_AUTH_PASSWORD: ${SWAGGER_AUTH_PASSWORD:-swagger123}
      APP_SECURITY_COOKIES_SECURE: ${APP_SECURITY_COOKIES_SECURE:-true}
      APP_SECURITY_COOKIES_SAME_SITE: ${APP_SECURITY_COOKIES_SAME_SITE:-None}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@thousandtws.digital}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_DEALER_FOLDER: ${CLOUDINARY_DEALER_FOLDER:-dealer-logos}
      CLOUDINARY_DOCUMENTS_FOLDER: ${CLOUDINARY_DOCUMENTS_FOLDER:-documents}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BILLING_INTELLIGENCE_CACHE_TTL_HOURS: ${BILLING_INTELLIGENCE_CACHE_TTL_HOURS:-6}
      BILLING_INTELLIGENCE_ALERT_COOLDOWN_HOURS: ${BILLING_INTELLIGENCE_ALERT_COOLDOWN_HOURS:-6}
      BILLING_INTELLIGENCE_ALERT_REFRESH_LIMIT: ${BILLING_INTELLIGENCE_ALERT_REFRESH_LIMIT:-300}
      BILLING_INTELLIGENCE_HIGH_VALUE_THRESHOLD: ${BILLING_INTELLIGENCE_HIGH_VALUE_THRESHOLD:-5000}
      BILLING_INTELLIGENCE_GEMINI_TIMEOUT_SECONDS: ${BILLING_INTELLIGENCE_GEMINI_TIMEOUT_SECONDS:-20}
      BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_ENABLED: ${BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_ENABLED:-true}
      BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_PREFIX: ${BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_PREFIX:-rl:gemini}
      BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_GLOBAL_MAX: ${BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_GLOBAL_MAX:-50}
      BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_PER_CUSTOMER_MAX: ${BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_PER_CUSTOMER_MAX:-5}
      BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_WINDOW_SECONDS: ${BILLING_INTELLIGENCE_GEMINI_RATE_LIMIT_WINDOW_SECONDS:-60}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-500ms}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-500ms}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_SPRING: ${LOG_LEVEL_SPRING:-INFO}
      LOG_LEVEL_HIBERNATE_SQL: ${LOG_LEVEL_HIBERNATE_SQL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  npm-db:
    image: mariadb:10.11
    container_name: grota_npm_db
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_ROOT_PASSWORD:?Defina NPM_DB_ROOT_PASSWORD no arquivo .env}
      MYSQL_DATABASE: ${NPM_DB_NAME:-npm}
      MYSQL_USER: ${NPM_DB_USER:-npm}
      MYSQL_PASSWORD: ${NPM_DB_PASSWORD:?Defina NPM_DB_PASSWORD no arquivo .env}
    volumes:
      - npm_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2
    container_name: grota_npm
    restart: unless-stopped
    network_mode: host
    depends_on:
      npm-db:
        condition: service_healthy
      api-service:
        condition: service_started
    environment:
      DB_MYSQL_HOST: 127.0.0.1
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: ${NPM_DB_USER:-npm}
      DB_MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
      DB_MYSQL_NAME: ${NPM_DB_NAME:-npm}
      INITIAL_ADMIN_EMAIL: ${NPM_INITIAL_ADMIN_EMAIL:-admin@thousandtws.digital}
      INITIAL_ADMIN_PASSWORD: ${NPM_INITIAL_ADMIN_PASSWORD:?Defina NPM_INITIAL_ADMIN_PASSWORD no arquivo .env}
      DISABLE_IPV6: "true"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

  portainer:
    image: portainer/portainer-ce:latest
    container_name: grota_portainer
    restart: unless-stopped
    network_mode: host
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
