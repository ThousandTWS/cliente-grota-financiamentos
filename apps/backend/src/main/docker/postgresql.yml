# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: backend
services:
  postgresql:
    image: postgres:18.3
    volumes:
      - ./postgresql-grota-oficial-data/:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=grota_financiamentos
      - POSTGRES_USER=grota
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grota -d grota_financiamentos']
      interval: 5s
      timeout: 5s
      retries: 10
    # If you want to expose these ports outside your dev PC,
    # remove the "127.0.0.1:" prefix
    ports:
      - 127.0.0.1:5432:5432
