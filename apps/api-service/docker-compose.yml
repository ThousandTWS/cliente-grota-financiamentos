services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE_NAME:-grota/api-service}:${API_IMAGE_TAG:-local}
    container_name: grota_api_service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/grota_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-grota_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-grota_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-with-at-least-32-chars}
      SWAGGER_AUTH_USERNAME: ${SWAGGER_AUTH_USERNAME:-swagger}
      SWAGGER_AUTH_PASSWORD: ${SWAGGER_AUTH_PASSWORD:-swagger123}
      APP_SECURITY_COOKIES_SECURE: ${APP_SECURITY_COOKIES_SECURE:-false}
      APP_SECURITY_COOKIES_SAME_SITE: ${APP_SECURITY_COOKIES_SAME_SITE:-Lax}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@thousandtws.digital}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - backend

networks:
  backend:
    driver: bridge

