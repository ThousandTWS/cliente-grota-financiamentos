<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codigo de verificacao</title>
</head>
<body style="margin:0; padding:0; background:#f6f6f6; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:#f6f6f6; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" style="background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06);">
          <tr>
            <td style="padding:24px 28px; background:#111827; color:#ffffff;">
              <h1 style="margin:0; font-size:20px; font-weight:700;">Codigo de verificacao</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px; color:#111827;">
              <p style="margin:0 0 12px; font-size:15px;">Ola [[${name}]],</p>
              <p style="margin:0 0 12px; font-size:15px;">Use o codigo abaixo para confirmar sua conta:</p>
              <div style="font-size:28px; letter-spacing:6px; font-weight:700; padding:12px 16px; background:#f3f4f6; border-radius:6px; display:inline-block;">[[${code}]]</div>
              <p style="margin:16px 0 0; font-size:13px; color:#6b7280;">Se voce nao solicitou, ignore este email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
